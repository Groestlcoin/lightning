---
name: CI Ubuntu
on: [push, pull_request]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ['Ubuntu-22.04']
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/cache@v5
        with:
          path: ~/ci-cache
          key: apt-${{ runner.os }}

      - name: Install dependencies
        run: |
          bash -x .github/scripts/setup.sh
      - name: Build
        run: |
          set -e
          pip3 install --user pip wheel
          ./configure --prefix=/usr --enable-rust
          uv run make -j $(nproc)
          uv run make install DESTDIR=inst RUST_PROFILE=release
          cd inst/ && tar --sort=name --owner=0 --group=0 --numeric-owner -cvaf ../clightning-v-${{ matrix.os }}.tar.xz .
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: clightning-${{ github.sha }}-${{ matrix.os }}
          path: |
            clightning-v-${{ matrix.os }}.tar.xz
          if-no-files-found: error
          retention-days: 7
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: clightning-${{ github.sha }}-${{ matrix.os }}
